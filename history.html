    <h1>からあげの歴史について</h1>
    <p>唐揚げ(からあげ、空揚げ)とは、鶏肉にタレで下味を付けて小麦粉や薄力粉をまぶし、高温の油でカラッと揚げる料理のことである。鶏肉以外にもさかなやとうふ、やさいなどから作られることもある。</p>
    <p>からあげはもとは中国の揚げ文化がもとになっているという説が有力でこの説では江戸時代初期に中国の普茶料理が日本に伝わったことが始まりです。</p>
